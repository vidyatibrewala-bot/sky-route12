name: "SkyRoute Drone AI Simulation"
version: "1.0.0"
description: "A real-world task simulation where an AI agent plans medical delivery routes, avoids obstacles, and manages drone battery life."
tags: ["openenv", "drone", "path-planning", "medical-delivery"]
author: "SkyRoute Team"
repository: "https://huggingface.co/spaces/happyjourney1/skyroute-dashboard"
license: "MIT"
tasks:
  - id: "normal_delivery"
    name: "Normal Medical Delivery"
    description: "Standard altitude medical supply delivery to a designated drop-off point."
    difficulty: "Easy"
    grader: "server.graders.grade_normal_delivery"
  - id: "urgent_organ_transport"
    name: "Urgent Organ Transport"
    description: "High-priority organ transport requiring fast navigation and battery management."
    difficulty: "Medium"
    grader: "server.graders.grade_urgent_organ_transport"
  - id: "storm_evasion"
    name: "Extreme Weather Navigation"
    description: "Navigate through hazardous weather conditions while maintaining drone stability."
    difficulty: "Hard"
    grader: "server.graders.grade_storm_evasion"
  - id: "emergency_landing"
    name: "Emergency Landing"
    description: "Safely land the drone when battery is low or system failure occurs."
    difficulty: "Medium"
    grader: "server.graders.grade_emergency_landing"
  - id: "battery_optimization"
    name: "Battery Efficient Routing"
    description: "Complete the delivery while consuming minimum battery energy."
    difficulty: "Hard"
    grader: "server.graders.grade_normal_delivery"
space:
  hardware: "cpu-basic"
  sdk: "docker"
